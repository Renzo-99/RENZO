<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>목공실 관리</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#3182F6;--blue-h:#1B64DA;--blue-bg:#E8F3FF;--red:#F04452;--red-bg:#FFF0F1;--green:#30B47A;--green-bg:#E8FAF0;--orange:#F59E0B;--orange-bg:#FFF8E1;--gray-50:#F9FAFB;--gray-100:#F2F4F6;--gray-200:#E5E8EB;--gray-400:#B0B8C1;--gray-500:#8B95A1;--gray-600:#6B7684;--gray-700:#4E5968;--gray-800:#333D4B;--gray-900:#191F28;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08)}
body{font-family:'Pretendard Variable',-apple-system,system-ui,'Noto Sans KR',sans-serif;background:var(--gray-50);color:var(--gray-900);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;line-height:1.5}

/* 헤더 */
.hdr{height:56px;background:#fff;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;gap:12px}
.hdr h1{font-size:17px;font-weight:700;white-space:nowrap}
.hdr-center{display:flex;align-items:center;gap:6px}
.week-display{cursor:pointer;padding:4px 14px;border-radius:8px;transition:.15s;text-align:center;line-height:1.3}
.week-display:hover{background:var(--gray-100)}
.week-display .yw{font-size:13px;font-weight:700;color:var(--gray-800)}
.week-display .dr{font-size:11px;color:var(--gray-500)}
.hdr-right{display:flex;align-items:center;gap:6px}

/* 버튼 */
.btn{cursor:pointer;border:none;border-radius:8px;font-size:12px;font-weight:500;padding:7px 12px;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-ghost{background:none;color:var(--gray-600)}.btn-ghost:hover{background:var(--gray-100)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:var(--blue-h)}
.btn-outline{background:#fff;border:1px solid var(--gray-200);color:var(--gray-700)}.btn-outline:hover{background:var(--gray-50)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{color:var(--gray-400)}.btn-danger:hover{color:var(--red);background:var(--red-bg)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.9}

/* 알림 바 */
.alert-bar{background:var(--orange-bg);border-bottom:1px solid #FDEEB8;padding:7px 20px;font-size:12px;font-weight:500;color:#92400E;display:flex;align-items:center;gap:8px;flex-shrink:0}
.alert-bar .alert-close{margin-left:auto;cursor:pointer;opacity:.5;font-size:14px}.alert-bar .alert-close:hover{opacity:1}

/* 메인 레이아웃 */
.main{display:flex;flex:1;overflow:hidden}
.left{flex:1;overflow-y:auto;padding:20px}
.right{width:380px;background:#fff;border-left:1px solid var(--gray-200);display:flex;flex-direction:column;flex-shrink:0}

/* 요약 카드 */
.card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
.summary{display:flex;align-items:center;gap:16px;justify-content:center;flex-wrap:wrap}
.summary-item{text-align:center}
.summary-item .val{font-size:22px;font-weight:800}
.summary-item .lbl{font-size:11px;color:var(--gray-500);margin-top:2px}
.summary-item .val.blue{color:var(--blue)}
.summary-item .val.red{color:var(--red)}
.summary-item .val.small{font-size:12px;font-weight:600;color:var(--gray-700);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sep{width:1px;height:28px;background:var(--gray-200)}

/* 일별 섹션 */
.day-header{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
.day-header .left-part{display:flex;align-items:center;gap:8px}
.day-dot{width:8px;height:8px;border-radius:50%;background:var(--blue)}
.day-header h3{font-size:14px;font-weight:600}
.day-header .date{font-size:12px;color:var(--gray-500)}
.day-header .right-part{display:flex;align-items:center;gap:4px}

/* 공휴일 */
.day-header.holiday .day-dot{background:var(--red)}
.day-header.holiday h3{color:var(--red)}
.holiday-badge{font-size:10px;color:var(--red);font-weight:600;padding:2px 8px;background:var(--red-bg);border-radius:99px;cursor:pointer}
.holiday-badge:hover{opacity:.8}
.holiday-btn{font-size:11px;padding:3px 8px;border-radius:99px;border:1px dashed var(--gray-300);background:#fff;cursor:pointer;color:var(--gray-400);transition:.15s}
.holiday-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
/* 연차 뱃지 */
.leave-badge{font-size:10px;color:#7c3aed;font-weight:600;padding:2px 8px;background:#f3e8ff;border-radius:99px;cursor:pointer}
.leave-badge:hover{opacity:.8}
.leave-btn{font-size:11px;padding:3px 8px;border-radius:99px;border:1px dashed var(--gray-300);background:#fff;cursor:pointer;color:var(--gray-400);transition:.15s}
.leave-btn:hover{border-color:#7c3aed;color:#7c3aed;background:#f3e8ff}
/* 연차 관리 모달 */
.leave-form{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.leave-form input[type="date"]{padding:6px 10px;border:1px solid var(--gray-300);border-radius:var(--radius);font-size:13px}
.leave-form label{font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px}
.leave-form label input[type="radio"]{margin:0}
.leave-list{max-height:260px;overflow-y:auto}
.leave-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:4px}
.leave-item .li-date{font-size:13px;font-weight:600;color:var(--gray-800)}
.leave-item .li-type{font-size:11px;font-weight:600;color:#7c3aed;background:#f3e8ff;padding:2px 8px;border-radius:99px;margin-left:8px}
.leave-item .li-del{font-size:12px;color:var(--gray-400);cursor:pointer;border:none;background:none;padding:4px}
.leave-item .li-del:hover{color:var(--red)}

/* 작업 카드 */
.task{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow);transition:box-shadow .15s,opacity .15s,transform .15s}
.task:hover{box-shadow:var(--shadow-md)}
.task .drag-handle{cursor:grab;color:var(--gray-400);font-size:14px;flex-shrink:0;padding:2px;margin-top:1px;user-select:none;touch-action:none;display:flex;align-items:center}
.task .drag-handle:active{cursor:grabbing}
.task.dragging{opacity:.4;box-shadow:var(--shadow-md)}
.task.drag-over-top{border-top:2px solid var(--blue);margin-top:-2px}
.task.drag-over-bottom{border-bottom:2px solid var(--blue);margin-bottom:6px}
.day-tasks{min-height:8px}
.day-tasks.drag-day-hover{background:var(--blue-bg);border-radius:8px;outline:2px dashed var(--blue);outline-offset:-2px}
.task.has-mat{border-left:3px solid var(--blue)}
.task-num{width:22px;height:22px;border-radius:50%;background:var(--gray-100);color:var(--gray-500);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.task-body{flex:1;min-width:0}
.task-body input{width:100%;border:none;outline:none;font-size:13px;color:var(--gray-700);background:transparent;padding:0}
.task-body input::placeholder{color:var(--gray-400)}
.task-body p{font-size:15px;font-weight:700;color:var(--gray-800);cursor:text;min-height:20px}
.task-body p.empty{color:var(--gray-400)}
.mats{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.mat-badge{display:inline-flex;align-items:center;gap:4px;background:#f0fdf4;color:#16a34a;font-size:11px;font-weight:500;padding:3px 8px;border-radius:99px}
.mat-badge .qty{background:#16a34a;color:#fff;font-size:10px;padding:1px 5px;border-radius:99px}
.mat-badge .remove{cursor:pointer;opacity:.5;margin-left:2px;font-size:10px}.mat-badge .remove:hover{opacity:1}
.task-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.task:hover .task-actions{opacity:1}
.task-actions button{width:26px;height:26px;border:none;background:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gray-400);transition:.15s}
.task-actions .act-add{color:var(--blue)}.task-actions .act-add:hover{background:var(--blue-bg)}
.task-actions .act-edit{color:var(--gray-500)}.task-actions .act-edit:hover{color:var(--blue);background:var(--blue-bg)}
.task-actions .act-del:hover{color:var(--red);background:var(--red-bg)}
.empty-msg{font-size:12px;color:var(--gray-400);padding-left:16px;margin-bottom:8px}
.task-building{display:inline-block;font-size:10px;font-weight:600;color:var(--blue);background:var(--blue-bg);padding:2px 8px;border-radius:99px;margin-bottom:4px}
.task-note{font-size:11px;color:var(--gray-500);margin-top:4px;cursor:text}
.task-note.has-note{background:#fef2f2;color:#dc2626;padding:2px 6px;border-radius:4px;font-weight:500}
.task-edit-area{display:flex;flex-direction:column;gap:6px}
.task-edit-area select{padding:5px 8px;border:1px solid var(--gray-200);border-radius:6px;font-size:11px;outline:none;color:var(--gray-700);background:#fff;max-width:160px}
.task-edit-area select:focus{border-color:var(--blue)}
.task-edit-area input{border:1px solid var(--gray-200)!important;border-radius:6px;padding:5px 8px!important;font-size:12px}
.task-edit-area input:focus{border-color:var(--blue)!important}

/* 재고 패널 */
.inv-search{padding:14px;border-bottom:1px solid var(--gray-200)}
.search-wrap{position:relative}
.search-wrap .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:13px}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--blue)}
.filter-row{display:flex;gap:5px;margin-top:8px}
.filter-row button{padding:4px 10px;border-radius:99px;border:none;font-size:11px;font-weight:500;cursor:pointer;background:var(--gray-100);color:var(--gray-600);transition:.15s}
.filter-row button.active{background:var(--blue);color:#fff}
.filter-sep{width:1px;background:var(--gray-200);margin:0 2px}
#stockView{display:flex;flex-direction:column;flex:1;overflow:hidden}
.inv-list{flex:1;overflow-y:auto;padding:8px 14px 14px}
.inv-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;transition:background .1s;cursor:pointer}
.inv-item:hover{background:var(--gray-100)}
.inv-item .code{font-size:10px;font-weight:700;color:var(--gray-500);background:var(--gray-100);padding:3px 7px;border-radius:4px;width:46px;text-align:center;flex-shrink:0}
.inv-item .info{flex:1;min-width:0}
.inv-item .info .name{font-size:12px;font-weight:500;color:var(--gray-800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-item .info .sub{font-size:10px;color:var(--gray-400)}
.inv-item .stock{font-size:17px;font-weight:800;min-width:30px;text-align:right}
.inv-item .unit{font-size:10px;color:var(--gray-400);min-width:24px}
.stock.zero{color:var(--gray-400)}.stock.low{color:var(--red)}
.change-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;margin-right:4px}
.change-badge.up{background:var(--green-bg);color:var(--green)}
.change-badge.dn{background:var(--red-bg);color:var(--red)}
.inv-footer{padding:12px 14px;border-top:1px solid var(--gray-200);display:flex;gap:8px}
.inv-footer button{flex:1;padding:9px;font-size:12px}

/* 탭 */
.inv-tabs{display:flex;border-bottom:1px solid var(--gray-200)}
.inv-tabs button{flex:1;padding:10px;border:none;background:none;font-size:12px;font-weight:500;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.inv-tabs button.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}

/* 출고 내역 */
.history-item{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--gray-100);font-size:12px}
.history-item .h-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px}
.history-item .h-badge.out{background:var(--red-bg);color:var(--red)}
.history-item .h-badge.in{background:var(--green-bg);color:var(--green)}
.history-item .h-badge.adj{background:var(--orange-bg);color:var(--orange)}
.history-item .h-info{flex:1}
.history-item .h-info .h-name{font-weight:500;color:var(--gray-800)}
.history-item .h-info .h-sub{font-size:11px;color:var(--gray-500)}
.history-item .h-qty{font-weight:700}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:16px;padding:24px;width:440px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.modal.wide{width:560px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal label{font-size:12px;color:var(--gray-600);display:block;margin-bottom:4px;font-weight:500}
.modal input,.modal select{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;outline:none;margin-bottom:12px;transition:border .15s}
.modal input:focus,.modal select:focus{border-color:var(--blue)}
.modal .product-info{background:var(--gray-50);border-radius:var(--radius);padding:14px;margin-bottom:14px}
.modal .product-info .pi-code{font-weight:700;color:var(--blue);font-size:13px}
.modal .product-info .pi-name{font-size:14px;font-weight:600;margin-top:2px}
.modal .product-info .pi-stock{font-size:12px;color:var(--gray-500);margin-top:4px}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.modal-btns button{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.modal-product{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:.1s}
.modal-product:hover{background:var(--gray-50)}
.modal-product.disabled{opacity:.35;cursor:not-allowed}
.modal-product .mp-code{font-size:10px;font-weight:700;color:var(--gray-500);background:var(--gray-100);padding:3px 7px;border-radius:4px;min-width:46px;text-align:center}
.modal-product .mp-name{flex:1;font-size:12px;font-weight:500;color:var(--gray-800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-product .mp-stock{font-size:14px;font-weight:800}
.modal-product .mp-unit{font-size:10px;color:var(--gray-400)}
.modal-list{max-height:280px;overflow-y:auto;margin:8px -4px;padding:0 4px}
.pm-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border-bottom:1px solid var(--gray-100);transition:.1s}
.pm-row:hover{background:var(--gray-50)}
.pm-row .pm-code{font-size:10px;font-weight:700;color:var(--gray-500);background:var(--gray-100);padding:3px 7px;border-radius:4px;min-width:46px;text-align:center}
.pm-row .pm-name{flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pm-row .pm-stock{font-size:12px;font-weight:700;min-width:32px;text-align:right}
.pm-row .pm-unit{font-size:10px;color:var(--gray-400);min-width:24px}
.pm-row .pm-actions{display:flex;gap:4px}
.pm-row .pm-actions button{width:28px;height:28px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:12px;color:var(--gray-400);transition:.15s}
.pm-row .pm-actions button:hover{background:var(--gray-100);color:var(--gray-700)}
.pm-row .pm-actions button.del:hover{color:var(--red);background:var(--red-bg)}
.form-row{display:flex;gap:10px}.form-row>div{flex:1}

/* 인쇄 스타일 */
@page{margin:10mm;margin-top:8mm;margin-bottom:8mm}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;box-shadow:none!important}
  body{height:auto;overflow:visible;font-size:11px}
  .hdr,.right,.task-actions,.btn,.no-print,.alert-bar,.holiday-btn,.cal-overlay,#calendarRoot,.cr-overlay,#classroomRoot{display:none!important}
  .main{display:block;overflow:visible}
  .left{overflow:visible;padding:0}
  .print-header{display:block!important;text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #000}
  .print-header h1{font-size:20px;font-weight:800;margin-bottom:4px}
  .print-header p{font-size:13px;color:#555}
  .card{border:1px solid #ddd;page-break-inside:avoid}
  .task{border:1px solid #ddd;page-break-inside:avoid}
  .task-building{border:1px solid #2563eb;background:#eff6ff!important;color:#2563eb!important}
  .task-note{font-style:italic}
  .task-note.has-note{background:#fef2f2!important;color:#dc2626!important;padding:2px 6px;border-radius:4px}
  .mat-badge{border:1px solid #16a34a;background:#f0fdf4!important;color:#15803d!important}
  .mat-badge .qty{background:#16a34a!important;color:#fff!important}
  .mat-badge.zero-qty{display:none!important}
  .day-header{margin-top:16px}
  .holiday-badge{border:1px solid var(--red);color:#dc2626!important;background:#fef2f2!important}
  .leave-badge{border:1px solid #7c3aed;color:#7c3aed!important;background:#f3e8ff!important}
  .leave-btn{display:none!important}
  .print-inventory{display:block!important;page-break-before:always;padding-top:20px}
  .print-inventory h2{font-size:16px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #000}
  .print-inventory table{width:100%;border-collapse:collapse;font-size:11px}
  .print-inventory th,.print-inventory td{padding:6px 8px;border:1px solid #ddd;text-align:left}
  .print-inventory th{background:#f5f5f5!important;font-weight:600}
  .print-inventory td.num{text-align:right}
  .print-summary{display:block!important;margin-bottom:20px}
  .print-summary h2{font-size:16px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #000}
  .print-summary table{width:100%;border-collapse:collapse;font-size:11px}
  .print-summary th,.print-summary td{padding:6px 8px;border:1px solid #ddd;text-align:left}
  .print-summary th{background:#f5f5f5!important;font-weight:600}
}
.print-header,.print-inventory,.print-summary{display:none}

/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gray-900);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:200;animation:toastIn .3s;box-shadow:0 4px 20px rgba(0,0,0,.2)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* 반응형 */
@media(max-width:768px){
  .main{flex-direction:column}
  .right{width:100%;border-left:none;border-top:1px solid var(--gray-200);max-height:50vh}
  .left{padding:12px}
  .hdr{padding:0 12px;flex-wrap:wrap;height:auto;min-height:56px;padding:8px 12px}
  .hdr h1{font-size:15px}
  .hdr-right{flex-wrap:wrap;gap:4px}
  .summary{gap:10px}
  .task-actions{opacity:1}
}
@media(max-width:480px){
  .modal{padding:16px;width:100%;max-width:100vw;border-radius:12px 12px 0 0}
  .modal-overlay{align-items:flex-end}
}
@media(hover:none){.task-actions{opacity:1}}
#fileInput{display:none}

/* 캘린더 뷰 */
.cal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.cal-container{background:#fff;border-radius:16px;width:960px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.18);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--gray-200)}
.cal-header h2{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-nav .cal-label{font-size:15px;font-weight:700;min-width:110px;text-align:center}
.cal-body{flex:1;overflow-y:auto;padding:16px 20px 20px}

let _autoBackupTimer=null,_lastDataHash='';
function getDataHash(){
  let s=JSON.stringify(products)+JSON.stringify(history)+JSON.stringify(holidays)+JSON.stringify(buildings)+JSON.stringify(plans)+JSON.stringify(rooms)+JSON.stringify(leaves);
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('ws3_week_'))s+=localStorage.getItem(k);}
  let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
  return h.toString();
}
function startAutoBackup(){
  _lastDataHash=getDataHash();
  _autoBackupTimer=setInterval(()=>{
    const cur=getDataHash();
    if(cur!==_lastDataHash){
      createSnapshot('자동 백업 (5분)');
      _lastDataHash=cur;
    }
  },5*60*1000);
}

// === Undo 스택 ===
const undoStack=[];
const UNDO_MAX=30;
function pushUndo(key){
  const prev=localStorage.getItem(key);
  undoStack.push({key,data:prev});
  if(undoStack.length>UNDO_MAX)undoStack.shift();
}
function performUndo(){
  if(!undoStack.length){toast('되돌릴 작업이 없습니다');return;}
  const{key,data}=undoStack.pop();
  if(data===null)localStorage.removeItem(key);
  else localStorage.setItem(key,data);
  // 메모리 변수 재로드
  if(key==='ws3_plans'){loadPlans();renderPlanList();}
  else if(key==='ws3_rooms'){loadRooms();}
  else if(key==='ws3_products'){loadProducts();renderInventory();renderAlerts();}
  else if(key==='ws3_history'){loadHistory();renderInventory();}
  else if(key==='ws3_holidays'){loadHolidays();renderReport();}
  else if(key==='ws3_buildings'){loadBuildings();renderReport();}
  else if(key.startsWith('ws3_week_')){
    const parts=key.replace('ws3_week_','').split('_');
    const wy=parseInt(parts[0]),ww=parseInt(parts[1]);
    if(wy===yr&&ww===wk){loadWeek();renderReport();}
  }
  toast('↩ 실행 취소');
}
function safeSave(key,data){
  pushUndo(key);
  try{localStorage.setItem(key,JSON.stringify(data));
    // 변경 시각 기록 (클라우드 동기화 충돌 해결용)
    localStorage.setItem('ws3_lastModified',String(Date.now()));
    queueCloudSave(key.replace('ws3_',''),JSON.stringify(data));}
  catch(e){if(e.name==='QuotaExceededError'||e.code===22){if(history.length>500){history=history.slice(-200);try{localStorage.setItem('ws3_history',JSON.stringify(history));localStorage.setItem(key,JSON.stringify(data));toast('저장 공간 부족 → 오래된 내역 정리됨');return;}catch(e2){}}toast('저장 공간이 부족합니다. 데이터를 백업해주세요.');}else{console.error('저장 실패:',e);}queueCloudSave(key.replace('ws3_',''),JSON.stringify(data));}
}

// === 주간 네비게이션 ===
function getMonday(){
  const j=new Date(yr,0,4),dw=j.getDay()||7,m=new Date(j);
  m.setDate(j.getDate()-dw+1+(wk-1)*7);
  return m;
}

function getISOWeeksInYear(y){
  const t=new Date(Date.UTC(y,11,28));
  t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7));
  const y1=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return Math.ceil((((t-y1)/864e5)+1)/7);
}

function navWeek(dir){
  if(dir<0){
    if(wk<=1){yr--;wk=getISOWeeksInYear(yr);}
    else wk--;
  }else{
    const mx=getISOWeeksInYear(yr);
    if(wk>=mx){yr++;wk=1;}else wk++;
  }
  loadWeek();renderInventory();renderAlerts();
}

function goToday(){
  const d=new Date(),t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7));
  yr=t.getUTCFullYear();
  const y1=new Date(Date.UTC(yr,0,1));
  wk=Math.ceil((((t-y1)/864e5)+1)/7);
  loadWeek();renderInventory();renderAlerts();
}

function getWeekDateRange(y,w){
  const j=new Date(y,0,4),dw=j.getDay()||7,m=new Date(j);
  m.setDate(j.getDate()-dw+1+(w-1)*7);
  const f=new Date(m);f.setDate(m.getDate()+4);
  return{mon:m,fri:f,text:(m.getMonth()+1)+'월 '+m.getDate()+'일('+DOW_SHORT[m.getDay()]+') ~ '+(f.getMonth()+1)+'월 '+f.getDate()+'일('+DOW_SHORT[f.getDay()]+')'};
}

function openWeekPicker(){
  const range=getWeekDateRange(yr,wk);
  let h='<div class="modal"><h2>📆 연도/주차 이동</h2>';
  h+='<div class="form-row">';
  h+='<div><label>연도</label><input type="number" id="pickYear" value="'+yr+'" min="2020" max="2040" oninput="updateWeekPreview()"></div>';
  h+='<div><label>주차 (1~'+getISOWeeksInYear(yr)+')</label><input type="number" id="pickWeek" value="'+wk+'" min="1" max="53" oninput="updateWeekPreview()"></div>';
  h+='</div>';
  h+='<div id="weekPreview" style="background:var(--blue-bg);color:var(--blue);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;font-weight:600;text-align:center">📅 '+range.text+'</div>';

  showModal(h);
  setTimeout(()=>document.getElementById('pickYear')?.focus(),50);
}

function updateWeekPreview(){
  const y=parseInt(document.getElementById('pickYear').value);
  const w=parseInt(document.getElementById('pickWeek').value);
  const el=document.getElementById('weekPreview');
  if(!el||!y||!w||y<2020||y>2040)return;
  const maxW=getISOWeeksInYear(y);
  if(w<1||w>maxW){el.textContent='⚠️ 유효하지 않은 주차 (1~'+maxW+')';el.style.background='var(--orange-bg)';el.style.color='var(--orange)';return;}
  const range=getWeekDateRange(y,w);
  el.textContent='📅 '+range.text;el.style.background='var(--blue-bg)';el.style.color='var(--blue)';
}

function goToWeek(){
  const y=parseInt(document.getElementById('pickYear').value);
  const w=parseInt(document.getElementById('pickWeek').value);
  const maxW=getISOWeeksInYear(y);
  if(!y||y<2020||y>2040){toast('연도 범위: 2020~2040');return;}
  if(!w||w<1||w>maxW){toast('주차 범위: 1~'+maxW);return;}
  yr=y;wk=w;
  closeModal();loadWeek();renderInventory();renderAlerts();
  toast(yr+'년으로 이동');
}

// === 주간 데이터 로드 ===
function loadWeek(){
  const k='ws3_week_'+yr+'_'+wk,s=localStorage.getItem(k);
  if(s){
    days=JSON.parse(s);
    recalcNextId();
  }else{
    const m=getMonday();
    days=DAY_NAMES.map((n,i)=>{const dd=new Date(m);dd.setDate(m.getDate()+i);return{dn:n,dt:fmt(dd),tasks:[]};});
  }
  renderReport();
}

function fmt(d){return(d.getMonth()+1)+'/'+d.getDate();}
function fmtFull(d){return d.getFullYear()+'.'+(''+(d.getMonth()+1)).padStart(2,'0')+'.'+(''+(d.getDate())).padStart(2,'0');}

function getDayDate(di){
  const m=getMonday(),d=new Date(m);
  d.setDate(m.getDate()+di);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// === 드래그 앤 드롭 (작업 순서 변경, 요일 간 이동 지원) ===
const DOW_NAMES=['월','화','수','목','금'];
let _dragDi=null,_dragTi=null;
function initDragAndDrop(){
  document.querySelectorAll('.day-tasks').forEach(container=>{
    container.addEventListener('dragover',onDragOver);
    container.addEventListener('drop',onDrop);
    container.addEventListener('dragleave',onDragLeave);
  });
  document.querySelectorAll('.task[draggable="true"]').forEach(el=>{
    el.addEventListener('dragstart',onDragStart);
    el.addEventListener('dragend',onDragEnd);
  });
  initTouchDrag();
}
function onDragStart(e){
  const el=e.currentTarget;
  _dragDi=parseInt(el.dataset.day);_dragTi=parseInt(el.dataset.task);
  el.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',_dragDi+','+_dragTi);
}
function onDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  clearDragIndicators();
  _dragDi=null;_dragTi=null;
}
function clearDragIndicators(){
  document.querySelectorAll('.drag-over-top,.drag-over-bottom,.drag-day-hover').forEach(el=>el.classList.remove('drag-over-top','drag-over-bottom','drag-day-hover'));
}
function onDragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  clearDragIndicators();
  const container=e.currentTarget;
  const toDi=parseInt(container.dataset.day);
  // 다른 요일이면 컨테이너 하이라이트
  if(toDi!==_dragDi)container.classList.add('drag-day-hover');
  const target=getDropTarget(container,e.clientY);
  if(!target)return;
  const rect=target.el.getBoundingClientRect();
  if(e.clientY<rect.top+rect.height/2)target.el.classList.add('drag-over-top');
  else target.el.classList.add('drag-over-bottom');
}
function onDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el=>el.classList.remove('drag-over-top','drag-over-bottom'));
    e.currentTarget.classList.remove('drag-day-hover');
  }
}
function getDropTarget(container,clientY){
  const tasks=container.querySelectorAll('.task:not(.dragging)');
  let closest=null,closestDist=Infinity;
  tasks.forEach(t=>{
    const rect=t.getBoundingClientRect();
    const mid=rect.top+rect.height/2;
    const dist=Math.abs(clientY-mid);
    if(dist<closestDist){closestDist=dist;closest=t;}
  });
  if(!closest)return null;
  return{el:closest,di:parseInt(closest.dataset.day),ti:parseInt(closest.dataset.task)};
}
function moveTask(fromDi,fromTi,toDi,toTi,above){
  const srcArr=days[fromDi].tasks;
  const [item]=srcArr.splice(fromTi,1);
  const dstArr=days[toDi].tasks;
  let insertAt=toTi;
  if(fromDi===toDi&&fromTi<toTi)insertAt--;
  if(!above)insertAt++;
  insertAt=Math.max(0,Math.min(insertAt,dstArr.length));
  dstArr.splice(insertAt,0,item);
  saveWeek();renderReport();
  if(fromDi===toDi)toast((fromTi+1)+'번 → '+(insertAt+1)+'번 이동');
  else toast(DOW_NAMES[fromDi]+'→'+DOW_NAMES[toDi]+' '+(insertAt+1)+'번으로 이동');
}
function onDrop(e){
  e.preventDefault();
  clearDragIndicators();
  if(_dragDi===null)return;
  const container=e.currentTarget;
  const toDi=parseInt(container.dataset.day);
  const target=getDropTarget(container,e.clientY);
  if(target){
    if(_dragDi===toDi&&_dragTi===target.ti)return;
    const rect=target.el.getBoundingClientRect();
    const above=e.clientY<rect.top+rect.height/2;
    moveTask(_dragDi,_dragTi,toDi,target.ti,above);
  }else{
    // 빈 요일에 드롭
    if(_dragDi===toDi)return;
    const srcArr=days[_dragDi].tasks;
    const [item]=srcArr.splice(_dragTi,1);
    days[toDi].tasks.push(item);
    saveWeek();renderReport();
    toast(DOW_NAMES[_dragDi]+'→'+DOW_NAMES[toDi]+' 이동');
  }
}

// 터치 드래그 지원 (모바일, 요일 간 이동 포함)
function initTouchDrag(){
  let touchEl=null,touchClone=null,touchDi=null,touchTi=null;
  document.querySelectorAll('.task .drag-handle').forEach(handle=>{
    handle.addEventListener('touchstart',function(e){
      const task=this.closest('.task');
      if(!task||task.getAttribute('draggable')==='false')return;
      touchDi=parseInt(task.dataset.day);touchTi=parseInt(task.dataset.task);
      touchEl=task;
      touchClone=task.cloneNode(true);
      touchClone.style.cssText='position:fixed;z-index:9999;pointer-events:none;opacity:.8;width:'+task.offsetWidth+'px;left:'+task.getBoundingClientRect().left+'px;top:'+task.getBoundingClientRect().top+'px;transition:none;';
      document.body.appendChild(touchClone);
      task.classList.add('dragging');
      e.preventDefault();
    },{passive:false});
  });
  document.addEventListener('touchmove',function(e){
    if(!touchClone)return;
    e.preventDefault();
    const y=e.touches[0].clientY;
    touchClone.style.top=(y-30)+'px';
    clearDragIndicators();
    // 모든 day-tasks에서 가장 가까운 타겟 찾기
    let best=null,bestDist=Infinity,bestContainer=null;
    document.querySelectorAll('.day-tasks').forEach(c=>{
      const rect=c.getBoundingClientRect();
      if(y>=rect.top-50&&y<=rect.bottom+50){
        const di=parseInt(c.dataset.day);
        if(di!==touchDi)c.classList.add('drag-day-hover');
        c.querySelectorAll('.task:not(.dragging)').forEach(t=>{
          const tr=t.getBoundingClientRect();
          const dist=Math.abs(y-(tr.top+tr.height/2));
          if(dist<bestDist){bestDist=dist;best=t;bestContainer=c;}
        });
      }
    });
    if(best){
      const rect=best.getBoundingClientRect();
      if(y<rect.top+rect.height/2)best.classList.add('drag-over-top');
      else best.classList.add('drag-over-bottom');
    }
  },{passive:false});
  document.addEventListener('touchend',function(e){
    if(!touchClone)return;
    if(touchClone.parentNode)touchClone.remove();
    if(touchEl)touchEl.classList.remove('dragging');
    const overTop=document.querySelector('.drag-over-top');
    const overBottom=document.querySelector('.drag-over-bottom');
    const hoverDay=document.querySelector('.drag-day-hover');
    clearDragIndicators();
    if(overTop||overBottom){
      const targetEl=overTop||overBottom;
      const toDi=parseInt(targetEl.dataset.day);
      const toTi=parseInt(targetEl.dataset.task);
      if(toDi!==touchDi||toTi!==touchTi){
        moveTask(touchDi,touchTi,toDi,toTi,!!overTop);
      }
    }else if(hoverDay){
      const toDi=parseInt(hoverDay.dataset.day);
      if(toDi!==touchDi){
        const srcArr=days[touchDi].tasks;
        const [item]=srcArr.splice(touchTi,1);
        days[toDi].tasks.push(item);
        saveWeek();renderReport();
        toast(DOW_NAMES[touchDi]+'→'+DOW_NAMES[toDi]+' 이동');
      }
    }
    touchEl=null;touchClone=null;touchDi=null;touchTi=null;
  });
}

function openBuildingManager(returnDi,returnTi){
  function render(){
    let h='<div class="modal"><h2>🏢 건물 관리</h2>';
    h+='<div style="display:flex;gap:8px;margin-bottom:12px">';
    h+='<input id="newBldgName" placeholder="새 건물 이름..." style="flex:1" onkeydown="if(event.key===\'Enter\')addBuildingFromManager()">';
    h+='<button class="btn btn-blue" onclick="addBuildingFromManager()">추가</button>';
    h+='</div>';
    h+='<div class="modal-list" style="max-height:300px">';
    buildings.forEach((b,i)=>{
      h+='<div class="pm-row">';
      h+='<span class="pm-name" style="font-size:13px">'+esc(b)+'</span>';
      h+='<div class="pm-actions">';
      h+='<button onclick="editBuildingName('+i+')" title="이름 변경">✏️</button>';
      h+='<button class="del" onclick="deleteBuildingItem('+i+')" title="삭제">🗑</button>';
      h+='</div></div>';
    });
    if(!buildings.length)h+='<p style="text-align:center;color:var(--gray-400);padding:20px">등록된 건물이 없습니다</p>';
    h+='</div>';
    h+='<div style="margin-top:12px;text-align:right"><button class="btn btn-outline" onclick="closeModal();'+(returnDi!==undefined?'renderReport();focusEditInput()':'')+'" >닫기</button></div>';
    h+='</div>';
    showModal(h);
  }
  window.addBuildingFromManager=()=>{
    const inp=document.getElementById('newBldgName');
    const name=inp.value.trim();
    if(!name){toast('건물 이름을 입력하세요');return;}
    if(buildings.includes(name)){toast('이미 존재하는 건물입니다');return;}
    buildings.push(name);saveBuildings();render();
    toast(name+' 추가됨');
  };
  window.editBuildingName=(idx)=>{
    const oldName=buildings[idx];
    const newName=prompt('건물 이름 변경:',oldName);
    if(!newName||!newName.trim()||newName.trim()===oldName)return;
    const bn=newName.trim();
    if(buildings.includes(bn)){toast('이미 존재하는 건물입니다');return;}
    // 기존 작업의 건물명도 일괄 변경
    let updated=0;
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(!k.startsWith('ws3_week_'))continue;
      try{
        const wd=JSON.parse(localStorage.getItem(k));
        let changed=false;
        wd.forEach(d=>d.tasks.forEach(t=>{if(t.building===oldName){t.building=bn;changed=true;updated++;}}));
        if(changed)localStorage.setItem(k,JSON.stringify(wd));
      }catch(e){}
    }
    buildings[idx]=bn;saveBuildings();
    // 현재 주간 데이터도 갱신
    days.forEach(d=>d.tasks.forEach(t=>{if(t.building===oldName)t.building=bn;}));
    saveWeek();render();
    toast(oldName+' → '+bn+' 변경'+(updated?' (작업 '+updated+'건 업데이트)':''));
  };
  window.deleteBuildingItem=(idx)=>{
    const name=buildings[idx];
    if(!confirm('"'+name+'" 건물을 삭제하시겠습니까?\n(기존 작업의 건물 정보는 유지됩니다)'))return;
    buildings.splice(idx,1);saveBuildings();render();
    toast(name+' 삭제됨');
  };
  render();
}

function deleteTask(di,ti){
  const t=days[di].tasks[ti];
  const desc=t.desc||'(미입력)';

    if(p){p.stock+=m.qty;p.tout=Math.max(0,p.tout-m.qty);}

  saveWeek();saveProducts();saveHistory();renderReport();renderInventory();renderHistory();renderAlerts();
  toast('작업이 삭제되었습니다');
}

function renderLeaveList(){
  const el=document.getElementById('leaveList');
  if(!el)return;
  if(!leaves.length){el.innerHTML='<p style="text-align:center;color:var(--gray-400);padding:16px;font-size:13px">등록된 연차가 없습니다</p>';return;}

  const sorted=leaves.slice().sort((a,b)=>a.date.localeCompare(b.date));

  sorted.forEach(lv=>{

function saveProduct(pid){
  const code=document.getElementById('pCode').value.trim();
  const name=document.getElementById('pName').value.trim();
  const cat=document.getElementById('pCat').value;
  const unit=document.getElementById('pUnit').value.trim()||'개';
  const stock=Math.max(0,parseInt(document.getElementById('pStock').value)||0);
  if(!code||!name){toast('품목코드와 이름을 입력하세요');return;}
  // 코드 중복 체크
  const dup=products.find(x=>x.code===code&&x.id!==pid);
  if(dup){toast('이미 존재하는 품목코드입니다: '+code);return;}

  if(pid){
    const p=productMap.get(pid);
    if(p){
      const oldStock=p.stock;
      p.code=code;p.name=name;p.cat=cat;p.unit=unit;p.stock=stock;
      if(stock!==oldStock){
        const diff=stock-oldStock;
        if(diff>0){p.tin+=diff;}else{p.tout+=Math.abs(diff);}
        addHistory(diff>0?'in':'out',pid,Math.abs(diff),'재고 수동 조정 ('+oldStock+' → '+stock+')');
      }
    }
    toast(name+' 수정 완료');
  }else{
    products.push({id:nextId++,code,name,cat,unit,stock,tin:stock,tout:0});
    toast(name+' 추가 완료');
  }
  saveProducts();saveHistory();renderInventory();renderAlerts();
  if(window._formFromList){closeModal();window._formFromList=false;}else{openProductManager();}
}

function deleteProduct(pid){
  const p=productMap.get(pid);
  if(!p)return;
  let inUse=false;
  days.forEach(d=>d.tasks.forEach(t=>t.mats.forEach(m=>{if(m.pid===pid)inUse=true;})));
  let msg='"'+p.name+'" 품목을 삭제하시겠습니까?';
  if(inUse)msg+='\n⚠️ 현재 주간 보고서에서 사용 중인 품목입니다.';
  if(!confirm(msg))return;
  products=products.filter(x=>x.id!==pid);
  saveProducts();renderInventory();renderAlerts();
  openProductManager();
  toast(p.name+' 삭제 완료');
}

function renderInventory(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  // 주간 사용량 계산
  const weekUsage={};
  days.forEach(d=>d.tasks.forEach(t=>t.mats.forEach(m=>{weekUsage[m.pid]=(weekUsage[m.pid]||0)+m.qty;})));

  const list=products.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q)&&!p.code.toLowerCase().includes(q))return false;
    if(catFilter!=='all'&&p.cat!==catFilter)return false;
    if(filter==='zero')return p.stock===0;
    if(filter==='low')return p.stock>0&&p.stock<=5;
    return true;
  });

  if(!list.length){
    document.getElementById('invList').innerHTML='<p style="text-align:center;color:var(--gray-400);padding:40px 0;font-size:13px">'+(q?'검색 결과가 없습니다':'해당하는 품목이 없습니다')+'</p>';
    return;
  }

  document.getElementById('invList').innerHTML=list.map(p=>{
    const wu=weekUsage[p.id]||0;
    let h='<div class="inv-item" onclick="openProductForm('+p.id+',true)">';
    h+='<span class="code">'+p.code+'</span>';
    h+='<div class="info"><div class="name">'+esc(p.name)+'</div>';
    h+='<div class="sub">입고 '+p.tin+' · 출고 '+p.tout+(wu?' · <b style="color:var(--blue)">금주 -'+wu+'</b>':'')+'</div></div>';
    if(wu)h+='<span class="change-badge dn">-'+wu+'</span>';
    h+='<span class="stock'+(p.stock===0?' zero':p.stock<=5?' low':'')+'">'+p.stock+'</span>';
    h+='<span class="unit">'+p.unit+'</span></div>';
    return h;
  }).join('');
}

function addHistory(type,pid,qty,memo){
  const d=new Date();
  const dateStr=d.getFullYear()+'.'+(''+(d.getMonth()+1)).padStart(2,'0')+'.'+(''+(d.getDate())).padStart(2,'0');
  history.push({type,pid,qty,memo:memo||'',date:dateStr});
  saveHistory();
}
function removeHistoryByTask(pid,qty,memo){
  // 가장 최근에 일치하는 출고 내역 1건 삭제
  for(let i=history.length-1;i>=0;i--){
    const h=history[i];
    if(h.type==='out'&&h.pid===pid&&h.qty===qty&&h.memo===memo){
      history.splice(i,1);
      return;
    }
  }
}

// === 자동 백업 시스템 ===
const MAX_BACKUPS=10;
function createSnapshot(reason){
  const allWeeks={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k.startsWith('ws3_week_'))allWeeks[k]=JSON.parse(localStorage.getItem(k));
  }
  const snapshot={
    id:Date.now(),
    reason:reason||'수동 백업',
    date:new Date().toISOString(),
    data:{products,history,holidays,buildings,plans,rooms,leaves,weeks:allWeeks}
  };
  const backups=getBackups();
  backups.unshift(snapshot);
  while(backups.length>MAX_BACKUPS)backups.pop();
  try{localStorage.setItem('ws3_backups',JSON.stringify(backups));}
  catch(e){backups.splice(5);localStorage.setItem('ws3_backups',JSON.stringify(backups));}
  return snapshot.id;
}
function getBackups(){
  try{return JSON.parse(localStorage.getItem('ws3_backups'))||[];}catch(e){return[];}
}
function restoreBackup(id){
  const backups=getBackups();
  const b=backups.find(x=>x.id===id);
  if(!b){toast('백업을 찾을 수 없습니다');return;}
  createSnapshot('복원 전 자동 백업');
  const d=b.data;
  products=d.products||[];saveProducts();
  history=d.history||[];saveHistory();
  holidays=d.holidays||{};saveHolidays();
  buildings=d.buildings||BUILDINGS_DEFAULT.slice();saveBuildings();
  plans=d.plans||[];savePlans();
  rooms=d.rooms||[];saveRooms();
  leaves=d.leaves||[];saveLeaves();
  if(d.weeks){Object.entries(d.weeks).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));}
  recalcNextId();loadWeek();renderInventory();renderFilterBar();renderAlerts();
  toast('✅ 백업이 복원되었습니다');
}
function deleteBackup(id){
  let backups=getBackups();
  backups=backups.filter(x=>x.id!==id);
  localStorage.setItem('ws3_backups',JSON.stringify(backups));
}
function formatBackupDate(iso){
  const d=new Date(iso);
  return d.getFullYear()+'.'+(d.getMonth()+1+'').padStart(2,'0')+'.'+(d.getDate()+'').padStart(2,'0')+' '+(d.getHours()+'').padStart(2,'0')+':'+(d.getMinutes()+'').padStart(2,'0');
}
function getBackupSummary(d){
  const pCount=(d.products||[]).length;
  const hCount=(d.history||[]).length;
  const wCount=Object.keys(d.weeks||{}).length;
  const plCount=(d.plans||[]).length;
  return '품목 '+pCount+'개 · 내역 '+hCount+'건 · 주차 '+wCount+'개 · 예정 '+plCount+'개';
}
function openBackupManager(){
  const backups=getBackups();
  let h='<div class="modal wide"><h2>📋 백업 관리</h2>';
  h+='<p style="font-size:12px;color:var(--gray-500);margin-bottom:12px">덮어쓰기 전 자동 저장됩니다. 최대 '+MAX_BACKUPS+'개 보관.</p>';
  h+='<div style="display:flex;gap:8px;margin-bottom:16px">';
  h+='<button class="btn btn-blue btn-sm" onclick="createSnapshot(\'수동 백업\');closeModal();openBackupManager();toast(\'✅ 백업 생성 완료\')">📸 지금 백업</button>';
  h+='<button class="btn btn-outline btn-sm" onclick="exportData()">💾 파일로 내보내기</button>';
  h+='</div>';
  if(!backups.length){

function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.products)throw new Error('잘못된 형식');
      const pCount=data.products.length;
      const hCount=(data.history||[]).length;
      const wCount=Object.keys(data.weeks||{}).length;
      if(!confirm('불러올 데이터: 품목 '+pCount+'개, 내역 '+hCount+'건, 주차 '+wCount+'개\n\n⚠️ 현재 데이터를 덮어씁니다.\n(현재 데이터는 자동 백업됩니다)\n\n진행하시겠습니까?'))return;
      createSnapshot('불러오기 전 자동 백업');
      products=data.products;saveProducts();
      if(data.history){history=data.history;saveHistory();}
      if(data.holidays){holidays=data.holidays;saveHolidays();}
      if(data.buildings){buildings=data.buildings;saveBuildings();}
      if(data.plans){plans=data.plans;savePlans();}
      if(data.rooms){rooms=data.rooms;saveRooms();}
      if(data.leaves){leaves=data.leaves;saveLeaves();}
      if(data.weeks){Object.entries(data.weeks).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));}
      recalcNextId();loadWeek();renderInventory();renderFilterBar();renderAlerts();
      toast('데이터를 불러왔습니다');
    }catch(err){alert('파일을 읽을 수 없습니다: '+err.message);}
  };
  reader.readAsText(file);
  event.target.value='';
}

// === 작업 이력 ===
function getMondayOf(y,w){
  const j=new Date(y,0,4),dw=j.getDay()||7,m=new Date(j);
  m.setDate(j.getDate()-dw+1+(w-1)*7);
  return m;
}

function loadAllTasks(year,month){
  const tasks=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k.startsWith('ws3_week_'))continue;
    const pts=k.replace('ws3_week_','').split('_');
    const wy=parseInt(pts[0]),ww=parseInt(pts[1]);
    const mon=getMondayOf(wy,ww);
    let wd;try{wd=JSON.parse(localStorage.getItem(k));}catch(e){continue;}
    if(!Array.isArray(wd))continue;
    wd.forEach((d,di)=>{
      const dd=new Date(mon);dd.setDate(mon.getDate()+di);
      if(dd.getFullYear()!==year)return;
      if(month&&dd.getMonth()+1!==month)return;
      d.tasks.forEach(t=>{
        tasks.push({date:dd,dateStr:dd.getFullYear()+'.'+(''+(dd.getMonth()+1)).padStart(2,'0')+'.'+(''+(dd.getDate())).padStart(2,'0'),dow:DOW_SHORT[dd.getDay()],building:t.building||'',desc:t.desc||'',note:t.note||'',mats:t.mats||[]});
      });
    });
  }
  tasks.sort((a,b)=>a.date-b.date);
  return tasks;
}

function navTH(dir){

  else{thYear+=dir;}
  renderTaskHistory();
}

// === 작업 예정 ===
let planFilter='all'; // all, pending, done

function renderPlanList(){
  const today=new Date();
  today.setHours(0,0,0,0);
  const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  // 필터링
  let filtered=plans.slice();
  if(planFilter==='pending')filtered=filtered.filter(p=>!p.done);
  if(planFilter==='done')filtered=filtered.filter(p=>p.done);

  // 날짜순 정렬 (시작일 기준, 완료는 뒤로)
  filtered.sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    const cmp=a.date.localeCompare(b.date);
    if(cmp!==0)return cmp;
    return (a.dateEnd||a.date).localeCompare(b.dateEnd||b.date);
  });

  const pending=plans.filter(p=>!p.done).length;
  const done=plans.filter(p=>p.done).length;

  let h='<div class="plan-header">';
  h+='<div style="display:flex;gap:4px">';
  h+='<button class="btn btn-sm '+(planFilter==='all'?'btn-blue':'btn-outline')+'" onclick="planFilter=\'all\';renderPlanList()">전체 '+plans.length+'</button>';
  h+='<button class="btn btn-sm '+(planFilter==='pending'?'btn-blue':'btn-outline')+'" onclick="planFilter=\'pending\';renderPlanList()">미완료 '+pending+'</button>';
  h+='<button class="btn btn-sm '+(planFilter==='done'?'btn-blue':'btn-outline')+'" onclick="planFilter=\'done\';renderPlanList()">완료 '+done+'</button>';
  h+='</div>';
  h+='<button class="btn btn-blue btn-sm" onclick="openPlanForm()">+ 추가</button>';
  h+='</div>';

  h+='<div class="plan-list">';
  if(!filtered.length){
    h+='<p class="th-empty">'+(planFilter==='done'?'완료된 작업이 없습니다':(planFilter==='pending'?'미완료 작업이 없습니다':'작업 예정이 없습니다.<br>상단 + 추가 버튼으로 등록하세요.'))+'</p>';
  }else{
    let lastGroupKey='';
    filtered.forEach(p=>{
      const groupKey=p.date+(p.dateEnd||'');
      if(groupKey!==lastGroupKey){
        lastGroupKey=groupKey;
        const pts=p.date.split('-');
        const startD=new Date(parseInt(pts[0]),parseInt(pts[1])-1,parseInt(pts[2]));
        startD.setHours(0,0,0,0);
        const startDow=DOW_SHORT[startD.getDay()];
        // D-day는 종료일 기준 (기간이면 종료일, 단일이면 해당 날짜)
        const endDateStr=p.dateEnd||p.date;
        const epts=endDateStr.split('-');
        const endD=new Date(parseInt(epts[0]),parseInt(epts[1])-1,parseInt(epts[2]));
        endD.setHours(0,0,0,0);
        const diff=Math.round((endD-today)/864e5);
        let ddayClass='future',ddayText='';
        if(diff<0){ddayClass='past';ddayText='D+'+Math.abs(diff);}
        else if(diff===0){ddayClass='today';ddayText='오늘';}
        else if(diff<=3){ddayClass='soon';ddayText='D-'+diff;}
        else{ddayClass='future';ddayText='D-'+diff;}
        if(p.dateEnd){
          const endDow=DOW_SHORT[endD.getDay()];
          const rangeDays=Math.round((endD-startD)/864e5)+1;
          h+='<div class="plan-group-hdr">'+p.date+' ('+startDow+') ~ '+p.dateEnd+' ('+endDow+') <span style="font-size:11px;color:var(--gray-500)">'+rangeDays+'일간</span> <span class="plan-dday '+ddayClass+'">'+ddayText+'</span></div>';
        }else{
          h+='<div class="plan-group-hdr">'+p.date+' ('+startDow+') <span class="plan-dday '+ddayClass+'">'+ddayText+'</span></div>';
        }
      }
      h+='<div class="plan-item'+(p.done?' done':'')+'">';
      h+='<div class="plan-check" onclick="togglePlan('+p.id+')">'+(p.done?'✓':'')+'</div>';
      h+='<div class="plan-info">';
      if(p.building)h+='<span class="plan-bld">'+esc(p.building)+'</span>';
      h+='<div class="plan-desc">'+esc(p.desc||'(내용 없음)')+'</div>';
      if(p.note)h+='<div class="plan-note">📝 '+esc(p.note)+'</div>';
      h+='</div>';
      h+='<div class="plan-actions">';
      if(!p.done)h+='<button class="move" onclick="movePlanToWeek('+p.id+')" title="이번 주 작업으로 전환">→</button>';
      h+='<button onclick="openPlanForm('+p.id+')" title="수정">✏️</button>';
      h+='<button class="del" onclick="deletePlan('+p.id+')" title="삭제">🗑</button>';
      h+='</div></div>';
    });
  }
  h+='</div>';
  document.getElementById('planView').innerHTML=h;
}

// ISO 주차 계산 헬퍼
function getISOWeekInfo(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
  const weekYear=d.getUTCFullYear();
  const y1=new Date(Date.UTC(weekYear,0,1));
  const weekNum=Math.ceil((((d-y1)/864e5)+1)/7);
  return{weekYear,weekNum};
}
// 단일 날짜를 주간 보고서에 추가하는 헬퍼
function addDateToWeek(date,desc,building,note){
  const dow=date.getDay();
  if(dow===0||dow===6)return null; // 주말 건너뛰기
  const dayIndex=dow-1;
  const{weekYear,weekNum}=getISOWeekInfo(date);
  const weekKey='ws3_week_'+weekYear+'_'+weekNum;
  let weekData;
  try{weekData=JSON.parse(localStorage.getItem(weekKey));}catch(e){weekData=null;}
  if(!weekData){
    const mon=getMondayOf(weekYear,weekNum);
    weekData=DAY_NAMES.map((n,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return{dn:n,dt:fmt(dd),tasks:[]};});
  }
  weekData[dayIndex].tasks.push({id:nextId++,desc,building,note:note||'',mats:[]});
  safeSave(weekKey,weekData);
  // 현재 주차면 메모리 갱신
  if(weekYear===yr&&weekNum===wk){days=weekData;renderReport();}
  return{weekYear,weekNum,dow};
}
// 예정 작업을 주간 보고서로 전환
function movePlanToWeek(pid){
  const p=plans.find(x=>x.id===pid);
  if(!p)return;

  if(p.dateEnd){
    // 기간 작업: 시작~종료 사이 모든 평일에 추가
    const spts=p.date.split('-');
    const startD=new Date(parseInt(spts[0]),parseInt(spts[1])-1,parseInt(spts[2]));
    const epts=p.dateEnd.split('-');
    const endD=new Date(parseInt(epts[0]),parseInt(epts[1])-1,parseInt(epts[2]));
    let addedCount=0;
    const cur=new Date(startD);
    while(cur<=endD){
      if(addDateToWeek(cur,p.desc,p.building,p.note))addedCount++;
      cur.setDate(cur.getDate()+1);
    }
    if(!addedCount){toast('기간 내 평일이 없습니다');return;}
    p.done=true;
    savePlans();renderPlanList();
    toast(p.date+' ~ '+p.dateEnd+' 기간의 평일 '+addedCount+'일에 작업이 추가되었습니다');
  }else{
    // 단일 날짜
    const pts=p.date.split('-');
    const date=new Date(parseInt(pts[0]),parseInt(pts[1])-1,parseInt(pts[2]));
    const dow=date.getDay();
    if(dow===0||dow===6){toast('주말 날짜는 주간 보고서에 추가할 수 없습니다');return;}
    const result=addDateToWeek(date,p.desc,p.building,p.note);
    if(!result)return;
    p.done=true;
    savePlans();renderPlanList();
    const dowNames=['일','월','화','수','목','금','토'];
    toast(result.weekYear+'년 '+result.weekNum+'주차 '+dowNames[result.dow]+'요일에 작업이 추가되었습니다');
  }
}

// === 클라우드 연동 (form POST 저장 + 다중 읽기) ===
function formPost(data){
  const id='_fp'+Date.now();
  const iframe=document.createElement('iframe');iframe.name=id;iframe.style.display='none';
  document.body.appendChild(iframe);
  const form=document.createElement('form');form.method='POST';form.action=SCRIPT_URL;form.target=id;
  const input=document.createElement('input');input.type='hidden';input.name='data';input.value=JSON.stringify(data);
  form.appendChild(input);document.body.appendChild(form);form.submit();
  setTimeout(()=>{try{form.remove();iframe.remove();}catch(e){}},5000);
}
function queueCloudSave(key,value){
  if(!SCRIPT_URL)return;
  _cloudQueue[key]=value;
  clearTimeout(_cloudTimer);
  _cloudTimer=setTimeout(flushCloudQueue,2000);
}
async function flushCloudQueue(){
  const keys=Object.keys(_cloudQueue);
  if(!SCRIPT_URL||!keys.length)return;
  const items=keys.map(k=>({key:k,value:_cloudQueue[k]}));
  _cloudQueue={};
  updateSyncStatus('syncing');
  try{
    const r=await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'data='+encodeURIComponent(JSON.stringify({action:'saveMultiple',items}))});
    updateSyncStatus('synced');
    console.log('[클라우드 저장] 전송 완료 ('+items.length+'개 항목)');
  }catch(e){
    console.warn('[클라우드 저장 실패]',e);
    updateSyncStatus('error');
    // formPost 폴백
    formPost({action:'saveMultiple',items});
  }
}
async function tryFetch(url,ms){
  const c=new AbortController();const t=setTimeout(()=>c.abort(),ms||8000);
  try{const r=await fetch(url,{signal:c.signal,redirect:'follow'});clearTimeout(t);return await r.json();}
  catch(e){clearTimeout(t);return null;}
}
function applyCloudData(d,force){
  if(!d||!Object.keys(d).length)return false;
  // 클라우드 products가 비어있으면 로컬 데이터를 보호
  const cloudProducts=d.products?JSON.parse(typeof d.products==='string'?d.products:JSON.stringify(d.products)):[];
  const localProducts=localStorage.getItem('ws3_products');
  const localArr=localProducts?JSON.parse(localProducts):[];
  if(localArr.length>0&&cloudProducts.length===0){
    console.log('[동기화 스킵] 클라우드 데이터가 비어있어 로컬 보호');
    return false;
  }
  // 타임스탬프 비교: 클라우드가 더 최신인 경우에만 적용
  if(!force){
    const cloudTs=parseInt(d.lastModified||'0',10);
    const localTs=parseInt(localStorage.getItem('ws3_lastModified')||'0',10);
    if(localTs>0&&cloudTs>0&&localTs>cloudTs){
      console.log('[동기화 스킵] 로컬이 더 최신 (로컬:'+new Date(localTs).toLocaleString()+', 클라우드:'+new Date(cloudTs).toLocaleString()+')');
      // 로컬이 더 최신이면 오히려 클라우드로 업로드
      uploadAllToCloud();
      return false;
    }
    if(localTs>0&&cloudTs===0){
      console.log('[동기화 스킵] 클라우드에 타임스탬프 없음 → 로컬 보호, 업로드 실행');
      uploadAllToCloud();
      return false;
    }
  }
  createSnapshot('클라우드 동기화 전 자동 백업');
  Object.entries(d).forEach(([k,v])=>{
    try{localStorage.setItem('ws3_'+k,typeof v==='string'?v:JSON.stringify(v));}catch(e){}
  });
  return true;
}
function tryJsonp(url,ms){
  return new Promise(resolve=>{
    const cb='_jp'+Date.now();
    const tm=setTimeout(()=>{cleanup();resolve(null);},ms||8000);
    function cleanup(){clearTimeout(tm);delete window[cb];try{s.remove();}catch(e){}}
    window[cb]=function(data){cleanup();resolve(data);};
    const s=document.createElement('script');
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    s.onerror=()=>{cleanup();resolve(null);};
    document.head.appendChild(s);
  });
}
async function loadFromCloud(){
  if(!SCRIPT_URL)return false;
  const url=SCRIPT_URL+'?action=loadAll';
  // 방법1: 직접 fetch
  let json=await tryFetch(url,6000);
  if(json&&json.success)return applyCloudData(json.data);
  // 방법2: JSONP
  json=await tryJsonp(url,6000);
  if(json&&json.success)return applyCloudData(json.data);
  // 방법3: CORS 프록시 (allorigins)
  json=await tryFetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url),6000);
  if(json&&json.success)return applyCloudData(json.data);
  // 방법4: CORS 프록시 (corsproxy)
  json=await tryFetch('https://corsproxy.io/?'+encodeURIComponent(url),6000);
  if(json&&json.success)return applyCloudData(json.data);
  return false;
}
async function uploadAllToCloud(){
  if(!SCRIPT_URL){toast('클라우드 URL이 설정되지 않았습니다');return;}
  updateSyncStatus('syncing');
  const items=[];
  items.push({key:'products',value:JSON.stringify(products)});
  items.push({key:'history',value:JSON.stringify(history)});
  items.push({key:'holidays',value:JSON.stringify(holidays)});
  items.push({key:'buildings',value:JSON.stringify(buildings)});
  items.push({key:'plans',value:JSON.stringify(plans)});
  items.push({key:'leaves',value:JSON.stringify(leaves)});
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('ws3_week_'))items.push({key:k.replace('ws3_',''),value:localStorage.getItem(k)});
  }
  formPost({action:'saveMultiple',items});
  setTimeout(()=>{updateSyncStatus('synced');toast('📤 업로드 요청 완료 ('+items.length+'개 항목). 스프레드시트에서 확인해주세요.');},3000);
}
function updateSyncStatus(s){
  const el=document.getElementById('syncStatus');if(!el)return;
  if(s==='syncing'){el.textContent='🔄';el.title='동기화 중...';}
  else if(s==='synced'){el.textContent='✅';el.title='클라우드 연결됨';}
  else if(s==='error'){el.textContent='⚠️';el.title='동기화 오류';}
  else{el.textContent='☁️';el.title='클라우드 대기';}
}

// === 캘린더 뷰 ===
let calYear, calMonth;

function openCalendar(){
  // 현재 보고 있는 주차의 월을 기본으로 표시
  const mon=getMonday();
  calYear=mon.getFullYear();
  calMonth=mon.getMonth()+1;
  renderCalendar();
}

function closeCalendar(){
  const el=document.getElementById('calendarRoot');
  if(el)el.innerHTML='';
}

function navCal(dir){
  calMonth+=dir;
  if(calMonth<1){calMonth=12;calYear--;}
  if(calMonth>12){calMonth=1;calYear++;}
  renderCalendar();
}

function getCalTasks(year,month){
  // 해당 월의 모든 작업을 날짜별로 그룹핑 (키: 'YYYY-MM-DD')
  const map={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k.startsWith('ws3_week_'))continue;
    const pts=k.replace('ws3_week_','').split('_');
    const wy=parseInt(pts[0]),ww=parseInt(pts[1]);
    const mon=getMondayOf(wy,ww);
    let wd;try{wd=JSON.parse(localStorage.getItem(k));}catch(e){continue;}
    if(!Array.isArray(wd))continue;
    wd.forEach((d,di)=>{
      const dd=new Date(mon);dd.setDate(mon.getDate()+di);
      if(dd.getFullYear()!==year)return;
      if(dd.getMonth()+1!==month)return;
      const key=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
      if(!map[key])map[key]=[];
      d.tasks.forEach(t=>{
        map[key].push({desc:t.desc||'',building:t.building||'',note:t.note||'',mats:t.mats||[],weekYear:wy,weekNum:ww,dayIndex:di});
      });
    });
  }
  // 작업예정(plans)도 캘린더에 표시
  plans.forEach(p=>{
    if(p.done)return;
    const startStr=p.date;
    const endStr=p.dateEnd||p.date;
    const spts=startStr.split('-');
    const epts=endStr.split('-');
    const sd=new Date(parseInt(spts[0]),parseInt(spts[1])-1,parseInt(spts[2]));
    const ed=new Date(parseInt(epts[0]),parseInt(epts[1])-1,parseInt(epts[2]));
    const cur=new Date(sd);
    while(cur<=ed){
      if(cur.getFullYear()===year&&cur.getMonth()+1===month){
        const key=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
        if(!map[key])map[key]=[];
        map[key].push({desc:p.desc||'',building:p.building||'',note:p.note||'',mats:[],isPlan:true,planId:p.id,dateEnd:p.dateEnd||null});
      }
      cur.setDate(cur.getDate()+1);
    }
  });
  return map;
}

function renderCalendar(){
  const taskMap=getCalTasks(calYear,calMonth);
  const today=new Date();
  const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  // 월 첫째 날, 마지막 날
  const firstDay=new Date(calYear,calMonth-1,1);
  const lastDay=new Date(calYear,calMonth,0);
  const startDow=firstDay.getDay(); // 0=일
  const totalDays=lastDay.getDate();

  // 이전 월 마지막 날들
  const prevLast=new Date(calYear,calMonth-1,0);
  const prevDays=prevLast.getDate();

  let h='<div class="cal-overlay" onclick="if(event.target===this)closeCalendar()">';
  h+='<div class="cal-container">';
  // 헤더
  h+='<div class="cal-header">';
  h+='<h2>📅 캘린더</h2>';
  h+='<div class="cal-nav">';
  h+='<button class="btn btn-ghost btn-sm" onclick="navCal(-1)">◀</button>';
  h+='<span class="cal-label">'+calYear+'년 '+calMonth+'월</span>';
  h+='<button class="btn btn-ghost btn-sm" onclick="navCal(1)">▶</button>';
  h+='<button class="btn btn-outline btn-sm" style="margin-left:8px" onclick="calYear='+today.getFullYear()+';calMonth='+(today.getMonth()+1)+';renderCalendar()">오늘</button>';
  h+='<button class="btn btn-outline btn-sm" style="margin-left:8px;color:#7c3aed;border-color:#7c3aed" onclick="openLeaveManager()">🏖️ 연차 관리</button>';
  h+='<button class="btn btn-ghost btn-sm" style="margin-left:12px;font-size:16px" onclick="closeCalendar()" title="닫기">✕</button>';
  h+='</div></div>';
  // 달력
  h+='<div class="cal-body"><div class="cal-grid">';
  // 요일 헤더
  const dowNames=['일','월','화','수','목','금','토'];
  dowNames.forEach(d=>{h+='<div class="cal-dow">'+d+'</div>';});

  // 이전 월 빈칸
  for(let i=startDow-1;i>=0;i--){
    const d=prevDays-i;
    const col=(startDow-1-i)%7;
    h+='<div class="cal-cell other'+(col===0?' sun':'')+(col===6?' sat':'')+'"><span class="cal-date">'+d+'</span></div>';
  }

  // 현재 월
  for(let d=1;d<=totalDays;d++){
    const dateStr=calYear+'-'+String(calMonth).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=dateStr===todayStr;
    const tasks=taskMap[dateStr]||[];
    const hasTask=tasks.length>0;
    const isHol=!!holidays[dateStr];
    const cellDow=(startDow+d-1)%7; // 0=일

    h+='<div class="cal-cell'+(isToday?' today':'')+(hasTask?' has-task':'')+(cellDow===0?' sun':'')+(cellDow===6?' sat':'')+'" onclick="openCalDay(\''+dateStr+'\')">';
    h+='<span class="cal-date">'+d+'</span>';
    if(isHol)h+='<div class="cal-holiday">'+esc(holidays[dateStr])+'</div>';
    const calLeaves=leaves.filter(l=>l.date===dateStr);
    calLeaves.forEach(lv=>{h+='<div class="cal-leave">🏖️ '+(lv.who?esc(lv.who)+' ':'')+esc(lv.type)+'</div>';});

    // 작업 표시 (최대 3개)
    h+='<div class="cal-tasks">';
    const maxShow=3;
    tasks.slice(0,maxShow).forEach(t=>{
      const label=t.building?(t.building+' '):'';
      const planCls=t.isPlan?' plan':'';
      const prefix=t.isPlan?'[예정] ':'';
      h+='<div class="cal-task-item'+planCls+'" title="'+esc(prefix+t.desc)+'">'+esc(label+(t.desc||'(미입력)'))+'</div>';
    });
    if(tasks.length>maxShow){
      h+='<div class="cal-task-more">+'+(tasks.length-maxShow)+'건 더보기</div>';
    }
    h+='</div>';
    h+='</div>';
  }

  // 다음 월 빈칸
  const totalCells=startDow+totalDays;
  const remain=totalCells%7===0?0:7-totalCells%7;
  for(let d=1;d<=remain;d++){
    const col=(totalCells+d-1)%7;
    h+='<div class="cal-cell other'+(col===0?' sun':'')+(col===6?' sat':'')+'"><span class="cal-date">'+d+'</span></div>';
  }

  h+='</div></div></div></div>';

  let root=document.getElementById('calendarRoot');
  if(!root){root=document.createElement('div');root.id='calendarRoot';document.body.appendChild(root);}
  root.innerHTML=h;
}

// 캘린더 날짜 클릭 → 해당 날짜의 작업 상세 + 수정
function openCalDay(dateStr){
  const parts=dateStr.split('-');
  const year=parseInt(parts[0]),month=parseInt(parts[1]),day=parseInt(parts[2]);
  const date=new Date(year,month-1,day);
  const dowStr=DOW_SHORT[date.getDay()];

  // 해당 날짜가 속한 주차 찾기
  const weekInfo=getWeekInfoForDate(date);
  if(!weekInfo)return;

  const {weekYear,weekNum,dayIndex}=weekInfo;

  // 해당 날짜의 작업예정 조회
  const dayPlans=plans.filter(p=>{
    if(p.done)return false;
    const endStr=p.dateEnd||p.date;
    return dateStr>=p.date&&dateStr<=endStr;
  });

  // 주말(토/일)인 경우
  if(dayIndex<0||dayIndex>4){
    let h='<div class="modal"><h2>'+month+'월 '+day+'일 ('+dowStr+')</h2>';
    h+='<p class="cal-no-task">주말은 작업을 등록할 수 없습니다.</p>';
    if(dayPlans.length){
      h+='<div style="margin-top:8px">';
      dayPlans.forEach((p,idx)=>{
        h+='<div class="cal-day-task" style="border-left-color:#ff9800">';
        h+='<div class="cdt-num">'+(idx+1)+'</div>';
        h+='<div class="cdt-body">';
        h+='<span style="font-size:10px;font-weight:600;color:#e65100;background:#fff3e0;padding:1px 6px;border-radius:99px;margin-right:4px">예정</span>';
        if(p.building)h+='<span class="cdt-bld" style="background:#fff3e0;color:#e65100">'+esc(p.building)+'</span>';
        h+='<div class="cdt-desc">'+esc(p.desc||'(미입력)')+'</div>';
        if(p.note)h+='<div class="cdt-note">📝 '+esc(p.note)+'</div>';
        if(p.dateEnd)h+='<div style="font-size:11px;color:var(--gray-500)">'+p.date+' ~ '+p.dateEnd+'</div>';
        h+='</div></div>';
      });
      h+='</div>';
    }
    h+='<div class="modal-btns"><button class="btn btn-outline" onclick="closeModal()">닫기</button></div></div>';
    showModal(h);
    return;
  }

  // 평일: 주차 데이터 로드 (없으면 빈 구조 생성)
  const weekKey='ws3_week_'+weekYear+'_'+weekNum;
  let weekData;
  try{weekData=JSON.parse(localStorage.getItem(weekKey));}catch(e){weekData=null;}
  if(!weekData){
    const mon=getMondayOf(weekYear,weekNum);
    weekData=DAY_NAMES.map((n,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return{dn:n,dt:fmt(dd),tasks:[]};});
  }

  const dayData=weekData[dayIndex];
  const tasks=dayData.tasks||[];
  const isHol=!!holidays[dateStr];

  let h='<div class="modal wide"><div class="cal-day-detail">';
  const calDayLeavesTitle=getLeavesForDate(dateStr);
  h+='<div class="cal-day-title">'+month+'월 '+day+'일 ('+dowStr+') ';
  if(isHol)h+='<span style="font-size:12px;color:var(--red);font-weight:600;background:var(--red-bg);padding:2px 8px;border-radius:99px">'+esc(holidays[dateStr])+'</span>';
  calDayLeavesTitle.forEach(lv=>{h+='<span style="font-size:12px;color:#7c3aed;font-weight:600;background:#f3e8ff;padding:2px 8px;border-radius:99px">🏖️ '+(lv.who?esc(lv.who)+' ':'')+esc(lv.type)+'</span>';});
  h+='<span style="font-size:12px;color:var(--gray-500);font-weight:400;margin-left:auto">'+weekYear+'년 '+weekNum+'주차</span>';
  h+='</div>';

  // 주간 작업 + 예정 작업 통합 목록
  const allItems=[];
  tasks.forEach((t,ti)=>{allItems.push({type:'task',data:t,ti});});
  dayPlans.forEach(p=>{allItems.push({type:'plan',data:p});});

  if(!allItems.length){
    h+='<p class="cal-no-task">등록된 작업이 없습니다</p>';
  }else{
    allItems.forEach((item,idx)=>{
      const t=item.data;
      const isPlan=item.type==='plan';
      if(isPlan){
        h+='<div class="cal-day-task" style="border-left-color:#ff9800">';
      }else{
        h+='<div class="cal-day-task" onclick="calEditTask('+weekYear+','+weekNum+','+dayIndex+','+item.ti+')">';
      }
      h+='<div class="cdt-num">'+(idx+1)+'</div>';
      h+='<div class="cdt-body">';
      if(isPlan)h+='<span style="font-size:10px;font-weight:600;color:#e65100;background:#fff3e0;padding:1px 6px;border-radius:99px;margin-right:4px">예정</span>';
      if(t.building)h+='<span class="cdt-bld"'+(isPlan?' style="background:#fff3e0;color:#e65100"':'')+'>'+esc(t.building)+'</span>';
      h+='<div class="cdt-desc">'+(esc(t.desc)||'<span style="color:var(--gray-400)">(내용 없음)</span>')+'</div>';
      if(t.note)h+='<div class="cdt-note">📝 '+esc(t.note)+'</div>';
      if(!isPlan&&t.mats&&t.mats.length){
        const mn=t.mats.map(m=>{const p=productMap.get(m.pid);return(p?p.name:'?')+'×'+m.qty;});
        h+='<div class="cdt-mats">📦 '+esc(mn.join(', '))+'</div>';
      }
      if(isPlan&&t.dateEnd)h+='<div style="font-size:11px;color:var(--gray-500)">'+t.date+' ~ '+t.dateEnd+'</div>';
      h+='</div></div>';
    });
  }

  // 연차 추가/삭제 (이름별)
  const calDayLeaves=getLeavesForDate(dateStr);
  if(calDayLeaves.length){
    calDayLeaves.forEach(lv=>{
      h+='<div style="margin-top:6px;padding:6px 10px;background:#f3e8ff;border-radius:8px;display:flex;align-items:center;justify-content:space-between">';
      h+='<span style="font-size:13px;color:#7c3aed;font-weight:600">🏖️ '+(lv.who?esc(lv.who)+' - ':'')+esc(lv.type)+'</span>';
      h+='<button class="btn btn-outline btn-sm" style="font-size:11px;color:var(--red);border-color:var(--red)" onclick="removeLeave(\''+dateStr+'\',\''+esc(lv.who||'')+'\');closeModal();renderCalendar()">삭제</button>';
      h+='</div>';
    });
  }
  // 아직 등록 안 된 사람 표시
  const registeredWho=calDayLeaves.map(l=>l.who);
  const unregistered=AUTHORS.filter(a=>!registeredWho.includes(a));
  if(unregistered.length){
    h+='<div style="margin-top:6px;padding:8px 10px;border:1px dashed var(--gray-300);border-radius:8px">';
    unregistered.forEach(who=>{
      h+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">';
      h+='<span style="font-size:12px;color:var(--gray-500);font-weight:600;min-width:50px">🏖️ '+who+':</span>';
      LEAVE_TYPES.forEach(t=>{
        h+='<button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 8px;color:#7c3aed;border-color:#c4b5fd" onclick="addLeaveFromCal(\''+dateStr+'\',\''+t+'\',\''+who+'\')">'+t+'</button>';
      });
      h+='</div>';
    });
    h+='</div>';
  }

  // 휴일 추가/삭제
  if(isHol){
    h+='<div style="margin-top:8px;padding:6px 10px;background:var(--red-bg);border-radius:8px;display:flex;align-items:center;justify-content:space-between">';
    h+='<span style="font-size:13px;color:var(--red);font-weight:600">📅 '+esc(holidays[dateStr])+'</span>';
    if(!DEFAULT_HOLIDAYS[dateStr]){
      h+='<button class="btn btn-outline btn-sm" style="font-size:11px;color:var(--red);border-color:var(--red)" onclick="removeHoliday(\''+dateStr+'\');closeModal();renderCalendar()">삭제</button>';
    }
    h+='</div>';
  }else{
    h+='<div style="margin-top:8px">';
    h+='<div style="display:flex;gap:6px;align-items:center">';
    h+='<input id="calHolidayName" placeholder="휴일 이름 (예: 개교기념일)" style="flex:1;border:1px solid var(--gray-300);border-radius:6px;padding:6px 10px;font-size:13px">';
    h+='<button class="btn btn-outline btn-sm" style="font-size:12px;color:var(--red);border-color:var(--red)" onclick="calAddHoliday(\''+dateStr+'\')">📅 휴일 추가</button>';
    h+='</div></div>';
  }

  h+='<div class="modal-btns" style="margin-top:12px">';
  h+='<button class="btn btn-outline" onclick="closeModal()">닫기</button>';
  h+='<button class="btn btn-blue" onclick="calAddTask('+weekYear+','+weekNum+','+dayIndex+')">+ 작업 추가</button>';
  h+='<button class="btn btn-outline" onclick="calGoToWeek('+weekYear+','+weekNum+')">이 주차로 이동</button>';
  h+='</div></div></div>';
  showModal(h);
}

function getWeekInfoForDate(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
  const weekYear=d.getUTCFullYear();
  const y1=new Date(Date.UTC(weekYear,0,1));
  const weekNum=Math.ceil((((d-y1)/864e5)+1)/7);
  // dayIndex: 월=0, 화=1, ... 금=4
  const dow=date.getDay(); // 0=일
  const dayIndex=dow===0?-1:dow-1; // 일요일=-1, 토요일=5
  if(dayIndex<0||dayIndex>4)return{weekYear,weekNum,dayIndex:-1};
  return{weekYear,weekNum,dayIndex};
}

// 캘린더에서 작업 수정
function calEditTask(wy,ww,di,ti){
  closeModal();
  const weekKey='ws3_week_'+wy+'_'+ww;
  let weekData;
  try{weekData=JSON.parse(localStorage.getItem(weekKey));}catch(e){return;}
  if(!weekData||!weekData[di])return;
  const task=weekData[di].tasks[ti];
  if(!task)return;

  let editBuilding=task.building||'';
  let editDesc=task.desc||'';
  let editNote=task.note||'';

  function renderEditModal(){
    let h='<div class="modal"><h2>✏️ 작업 수정</h2>';
    h+='<label>건물</label>';
    h+='<select id="calEditBuilding">';
    h+='<option value="">건물 선택...</option>';
    buildings.forEach(b=>{h+='<option value="'+esc(b)+'"'+(editBuilding===b?' selected':'')+'>'+esc(b)+'</option>';});
    h+='</select>';
    h+='<label>작업 내용</label>';
    h+='<input id="calEditDesc" value="'+esc(editDesc)+'" placeholder="작업 내용 입력...">';
    h+='<label>비고</label>';
    h+='<input id="calEditNote" value="'+esc(editNote)+'" placeholder="비고 (선택사항)">';
    if(task.mats&&task.mats.length){
      h+='<div style="margin-top:4px"><label>사용 자재</label>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">';
      task.mats.forEach(m=>{
        const p=productMap.get(m.pid);
        h+='<span class="mat-badge">'+esc(p?p.name:'?')+' <span class="qty">×'+m.qty+'</span></span>';
      });
      h+='</div></div>';
    }
    h+='<div class="modal-btns">';
    h+='<button class="btn btn-outline" onclick="closeModal();openCalDay(\''+getCalDateStrFromWeek(wy,ww,di)+'\')">취소</button>';
    h+='<button class="btn btn-danger btn-sm" onclick="calDeleteTask('+wy+','+ww+','+di+','+ti+')" style="background:none;border:1px solid var(--gray-200)">🗑 삭제</button>';
    h+='<button class="btn btn-blue" onclick="calSaveTask('+wy+','+ww+','+di+','+ti+')">저장</button>';
    h+='</div></div>';
    showModal(h);
    setTimeout(()=>document.getElementById('calEditDesc')?.focus(),50);
  }
  renderEditModal();
}

function getCalDayFromWeek(wy,ww,di){
  const mon=getMondayOf(wy,ww);
  const d=new Date(mon);d.setDate(mon.getDate()+di);
  return d.getDate();
}

function getCalDateStrFromWeek(wy,ww,di){
  const mon=getMondayOf(wy,ww);
  const d=new Date(mon);d.setDate(mon.getDate()+di);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function calSaveTask(wy,ww,di,ti){
  const weekKey='ws3_week_'+wy+'_'+ww;
  let weekData;
  try{weekData=JSON.parse(localStorage.getItem(weekKey));}catch(e){return;}
  if(!weekData||!weekData[di])return;

  const newBuilding=document.getElementById('calEditBuilding').value;
  const newDesc=document.getElementById('calEditDesc').value.trim();
  const newNote=document.getElementById('calEditNote').value.trim();

  weekData[di].tasks[ti].building=newBuilding;
  weekData[di].tasks[ti].desc=newDesc;
  weekData[di].tasks[ti].note=newNote;

  safeSave('ws3_week_'+wy+'_'+ww,weekData);

  // 현재 표시 중인 주차면 갱신
  if(wy===yr&&ww===wk){days=weekData;renderReport();}

  closeModal();
  const dateStr=getCalDateStrFromWeek(wy,ww,di);
  openCalDay(dateStr);
  renderCalendar();
  toast('작업이 수정되었습니다');
}

function calDeleteTask(wy,ww,di,ti){
  if(!confirm('이 작업을 삭제하시겠습니까?'))return;
  const weekKey='ws3_week_'+wy+'_'+ww;
  let weekData;
  try{weekData=JSON.parse(localStorage.getItem(weekKey));}catch(e){return;}
  if(!weekData||!weekData[di])return;

  const task=weekData[di].tasks[ti];
  // 자재 재고 복구
  if(task.mats&&task.mats.length){
    task.mats.forEach(m=>{
      const p=productMap.get(m.pid);
      if(p){p.stock+=m.qty;p.tout=Math.max(0,p.tout-m.qty);}
      removeHistoryByTask(m.pid,m.qty,'작업: '+(task.desc||'(미입력)'));
    });
    saveProducts();saveHistory();renderInventory();renderAlerts();
  }

  weekData[di].tasks.splice(ti,1);
  safeSave('ws3_week_'+wy+'_'+ww,weekData);

  if(wy===yr&&ww===wk){days=weekData;renderReport();}

  closeModal();
  const dateStr=getCalDateStrFromWeek(wy,ww,di);
  openCalDay(dateStr);
  renderCalendar();
  toast('작업이 삭제되었습니다');
}

// === 건물 호실 현황 ===
function getRoomBuildings(){
  const set=new Set();
  rooms.forEach(r=>set.add(r.bld));
  return Array.from(set);
}

// 전체화면 오버레이
function openClassroom(){
  if(!currentRoomBld){
    const blds=getRoomBuildings();
    currentRoomBld=blds.length?blds[0]:'';
  }
  renderClassroom();
}
function closeClassroom(){
  const el=document.getElementById('classroomRoot');
  if(el)el.innerHTML='';
}

function renderClassroom(){
  const blds=getRoomBuildings();
  if(!blds.length||!blds.includes(currentRoomBld))currentRoomBld=blds[0]||'';
  const filtered=rooms.filter(r=>r.bld===currentRoomBld);
  const totalDmg=filtered.reduce((s,r)=>s+(r.damage||0),0);
  const totalRep=filtered.reduce((s,r)=>s+(r.repaired||0),0);

  let h='<div class="cr-overlay" onclick="if(event.target===this)closeClassroom()">';
  h+='<div class="cr-container">';
  // 헤더
  h+='<div class="cr-header">';
  h+='<h2>🏢 건물 호실 현황</h2>';
  h+='<div class="cr-header-right">';

  h+='<button class="btn btn-ghost btn-sm" style="font-size:16px" onclick="closeClassroom()" title="닫기">✕</button>';
  h+='</div></div>';
  // 건물 탭
  h+='<div class="cr-bld-tabs">';
  blds.forEach(b=>{
    const cnt=rooms.filter(r=>r.bld===b).length;
    h+='<button class="'+(b===currentRoomBld?'active':'')+'" onclick="currentRoomBld=\''+esc(b).replace(/'/g,"\\'")+'\';renderClassroom()">'+esc(b)+' ('+cnt+')</button>';
  });
  h+='</div>';
  // 요약

  h+='<div class="cr-stat"><div class="val" style="color:var(--blue)">'+filtered.length+'</div><div class="lbl">호실</div></div>';
